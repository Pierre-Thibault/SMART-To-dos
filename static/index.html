<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART Goals Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link id="theme-light" rel="stylesheet" href="/static/theme-light.css">
    <link id="theme-dark" rel="stylesheet" href="/static/theme-dark.css">
    <style>
        /* ── Structural styles (theme-independent) ── */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-deep); color: var(--text-primary); min-height: 100vh; }
        body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
        .app { position: relative; z-index: 1; }

        .header { padding: 2rem 2.5rem 1.5rem; border-bottom: 1px solid var(--border); background: linear-gradient(180deg, rgba(79,143,247,0.06) 0%, transparent 100%); }
        .header-row { display: flex; justify-content: space-between; align-items: flex-start; }
        .header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; display: flex; align-items: center; gap: 0.6rem; }
        .header h1 .icon { width: 28px; height: 28px; background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan)); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 0.85rem; }
        .header-meta { margin-top: 0.4rem; font-size: 0.82rem; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }

        .tabs { display: flex; gap: 0; padding: 0 2.5rem; border-bottom: 1px solid var(--border); background: var(--bg-surface); }
        .tab { padding: 0.8rem 1.4rem; font-size: 0.85rem; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; user-select: none; }
        .tab:hover { color: var(--text-secondary); }
        .tab.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }

        .content { padding: 1.5rem 2.5rem 3rem; }
        .view { display: none; }
        .view.active { display: block; }

        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.2rem; transition: background 0.2s; }
        .stat-card:hover { background: var(--bg-card-hover); }
        .stat-label { font-size: 0.72rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 0.4rem; }
        .stat-value { font-size: 1.8rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; letter-spacing: -0.02em; }
        .stat-sub { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.2rem; }
        .stat-sub-inline { font-size: 0.9rem; font-weight: 400; color: var(--text-muted); }
        .stat-list { margin-top: 0.6rem; padding-top: 0.5rem; border-top: 1px solid var(--border); }
        .stat-list-header { font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.2rem; }
        .stat-list-header.on-track { color: var(--accent-green); }
        .stat-list-header.off-track { color: var(--accent-red); }
        .stat-list-item { font-size: 0.75rem; color: var(--text-secondary); padding: 0.15rem 0; display: flex; justify-content: space-between; align-items: center; text-decoration: none; transition: color 0.15s; }
        a.stat-list-item:hover { color: var(--accent-blue); }
        a.stat-list-item.on-track { color: var(--text-secondary); }
        a.stat-list-item.on-track:hover { color: var(--accent-green); }
        a.stat-list-item.off-track { color: var(--text-secondary); }
        a.stat-list-item.off-track:hover { color: var(--accent-red); }
        .stat-list-pct { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text-muted); }

        .toolbar { margin-top: 1rem; }
        .sort-control { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.5rem; }
        .sort-icon { font-size: 0.9rem; color: var(--text-muted); cursor: default; line-height: 1; }
        .sort-select { font-family: 'Outfit', sans-serif; font-size: 0.75rem; padding: 0.3rem 0.6rem; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-card); color: var(--text-primary); cursor: pointer; }

        .filter-bar { display: flex; flex-wrap: wrap; align-items: center; gap: 1.6rem; }
        .filter-bar:empty { display: none; }
        .filter-group { display: flex; align-items: center; gap: 0.3rem; flex-wrap: wrap; }
        .filter-group-label { font-size: 0.72rem; color: var(--text-muted); margin-right: 0.15rem; display: flex; align-items: center; gap: 0.25rem; }
        .filter-btn { font-family: 'Outfit', sans-serif; font-size: 0.7rem; padding: 0.2rem 0.55rem; border-radius: 999px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-secondary); cursor: pointer; transition: all 0.15s; user-select: none; }
        .filter-btn:hover:not(.disabled) { border-color: var(--accent-blue); color: var(--accent-blue); }
        .filter-btn.active { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }
        .filter-btn.disabled { opacity: 0.35; cursor: default; pointer-events: none; }
        .filter-btn-priority { font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; font-size: 0.68rem; }
        .filter-btn-priority.priority-capital { border-color: rgba(239,68,68,0.3); }
        .filter-btn-priority.priority-capital:not(.disabled) { background: rgba(239,68,68,0.15); color: var(--accent-red); }
        .filter-btn-priority.priority-capital.active { background: var(--accent-red); border-color: var(--accent-red); color: #fff; }
        .filter-btn-priority.priority-high { border-color: rgba(251,191,36,0.3); }
        .filter-btn-priority.priority-high:not(.disabled) { background: rgba(251,191,36,0.15); color: var(--accent-amber); }
        .filter-btn-priority.priority-high.active { background: var(--accent-amber); border-color: var(--accent-amber); color: #fff; }
        .filter-btn-priority.priority-medium { border-color: rgba(79,143,247,0.3); }
        .filter-btn-priority.priority-medium:not(.disabled) { background: rgba(79,143,247,0.1); color: var(--accent-blue); }
        .filter-btn-priority.priority-medium.active { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }
        .filter-btn-priority.priority-low { border-color: rgba(52,211,153,0.3); }
        .filter-btn-priority.priority-low:not(.disabled) { background: rgba(52,211,153,0.15); color: var(--accent-green); }
        .filter-btn-priority.priority-low.active { background: var(--accent-green); border-color: var(--accent-green); color: #fff; }
        .filter-btn-priority.priority-optional { border-color: rgba(85,101,128,0.3); }
        .filter-btn-priority.priority-optional:not(.disabled) { background: rgba(85,101,128,0.15); color: var(--text-secondary); }
        .filter-btn-priority.priority-optional.active { background: var(--text-secondary); border-color: var(--text-secondary); color: #fff; }

        .goal-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; transition: all 0.2s; }
        .goal-card:hover { background: var(--bg-card-hover); border-color: rgba(79,143,247,0.3); }
        .goal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
        .goal-header-3col { display: grid; grid-template-columns: 1fr auto auto; gap: 1.5rem; align-items: start; margin-bottom: 1rem; }
        .goal-left { min-width: 0; }
        .goal-right { text-align: right; white-space: nowrap; }
        .overview-timeline { max-width: 280px; font-size: 0.78rem; }
        .prediction-item-icon { display: flex; align-items: flex-start; gap: 0.3rem; margin-bottom: 0.4rem; }
        .prediction-item-icon .pred-icon { flex-shrink: 0; font-size: 0.75rem; line-height: 1; margin-top: 0.05rem; }
        .prediction-item-icon .pred-content { min-width: 0; }
        .overview-timeline .prediction-item-icon .pred-title { font-size: 0.72rem; }
        .overview-timeline .prediction-item-icon .pred-date { font-size: 0.65rem; }
        .goal-title { font-size: 1.1rem; font-weight: 600; }
        .goal-badges { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.4rem; }
        .pct-value { font-size: 1.4rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

        .tag { font-size: 0.68rem; font-family: 'JetBrains Mono', monospace; padding: 0.2rem 0.55rem; border-radius: 99px; background: rgba(79,143,247,0.12); color: var(--accent-blue); border: 1px solid rgba(79,143,247,0.2); }
        .badge { font-size: 0.68rem; font-weight: 600; padding: 0.2rem 0.55rem; border-radius: 99px; text-transform: uppercase; letter-spacing: 0.04em; }

        .status-done { background: rgba(52,211,153,0.15); color: var(--accent-green); }
        .status-in_progress { background: rgba(79,143,247,0.15); color: var(--accent-blue); }
        .status-not_started { background: rgba(85,101,128,0.2); color: var(--text-muted); }
        .status-paused { background: rgba(251,191,36,0.15); color: var(--accent-amber); }
        .status-cancelled { background: rgba(239,68,68,0.1); color: var(--accent-red); text-decoration: line-through; }

        .priority-capital { background: rgba(239,68,68,0.15); color: var(--accent-red); }
        .priority-high { background: rgba(251,191,36,0.15); color: var(--accent-amber); }
        .priority-medium { background: rgba(79,143,247,0.1); color: var(--accent-blue); }
        .priority-optional { background: rgba(85,101,128,0.15); color: var(--text-secondary); }
        .priority-low { background: rgba(52,211,153,0.15); color: var(--accent-green); }

        .mode-badge { font-size: 0.62rem; padding: 0.15rem 0.45rem; border-radius: 99px; font-family: 'JetBrains Mono', monospace; background: rgba(167,139,250,0.12); color: var(--accent-purple); border: 1px solid rgba(167,139,250,0.2); }
        .mode-text { font-size: 0.72rem; font-family: 'JetBrains Mono', monospace; color: var(--accent-blue); }
        .progress-detail { font-size: 0.68rem; font-family: 'JetBrains Mono', monospace; color: var(--text-muted); text-align: left; margin-top: 0.15rem; }
        .smart-badge { cursor: help; }
        .smart-tt-table { border-collapse: separate; border-spacing: 0 0.5rem; }
        .smart-tt-label { font-weight: 600; color: var(--accent-purple); padding-right: 0.8rem; vertical-align: top; white-space: nowrap; font-size: 0.72rem; }
        .smart-tt-value { color: var(--text-primary); font-size: 0.72rem; }
        .partial-badge { font-size: 0.6rem; padding: 0.1rem 0.4rem; border-radius: 99px; font-family: 'JetBrains Mono', monospace; background: rgba(251,191,36,0.12); color: var(--accent-amber); border: 1px solid rgba(251,191,36,0.2); vertical-align: middle; }

        .progress-bar-bg { height: 8px; background: var(--bar-track); border-radius: 99px; overflow: hidden; }
        .progress-bar-fill { height: 100%; border-radius: 99px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan)); }
        .progress-bar-fill.complete { background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan)); }

        .goal-meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.8rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
        .meta-label { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
        .meta-value { font-size: 0.88rem; font-weight: 500; font-family: 'JetBrains Mono', monospace; margin-top: 0.15rem; }
        .on-track { color: var(--accent-green); }
        .off-track { color: var(--accent-red); }

        .sub-table { width: 100%; margin-top: 1rem; border-collapse: collapse; }
        .sub-table th { font-size: 0.68rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); text-align: left; padding: 0.5rem 0.6rem; border-bottom: 1px solid var(--border); }
        .sub-table td { font-size: 0.82rem; padding: 0.55rem 0.6rem; border-bottom: 1px solid var(--sub-row-border); vertical-align: middle; }
        .sub-table tr:last-child td { border-bottom: none; }
        .sub-table tr.cancelled td { opacity: 0.5; }
        .deps-hint { font-size: 0.65rem; color: var(--text-muted); }
        .dep-link { cursor: pointer; transition: color 0.15s; }
        .dep-link:hover { color: var(--accent-blue); }
        tr.dep-highlight { background: rgba(79,143,247,0.1) !important; }
        .id-hint { font-size: 0.65rem; color: var(--text-muted); float: right; font-family: 'JetBrains Mono', monospace; }
        .cancelled-text { text-decoration: line-through; opacity: 0.6; }
        .checkbox { font-size: 0.9rem; vertical-align: 0.05em; margin-right: 0.2rem; }
        .checkbox-done { color: var(--accent-green); }
        .checkbox-progress { color: var(--accent-blue); }
        .checkbox-paused { color: var(--accent-amber); }
        .checkbox-cancelled { color: var(--accent-red); }
        .checkbox-empty { color: var(--text-muted); }

        .mini-progress { width: 60px; height: 4px; background: var(--bar-track); border-radius: 99px; overflow: hidden; display: inline-block; vertical-align: middle; margin-right: 0.4rem; }
        .mini-progress-fill { height: 100%; border-radius: 99px; background: var(--accent-blue); }
        .mono { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; }

        .gantt-container { overflow-x: auto; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; }
        .gantt-chart { position: relative; min-width: 800px; }
        .gantt-header { display: flex; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 0.5rem; margin-left: 220px; }
        .gantt-month { flex: 1; text-align: center; font-size: 0.72rem; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
        .gantt-row { display: flex; align-items: center; height: 36px; }
        .gantt-label { width: 220px; min-width: 220px; font-size: 0.78rem; padding-right: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .gantt-label.goal-label { font-weight: 600; }
        .gantt-label.sub-label { padding-left: 1.2rem; color: var(--text-secondary); font-size: 0.74rem; }
        .gantt-track { flex: 1; height: 100%; position: relative; }
        .gantt-bar { position: absolute; height: 20px; top: 50%; transform: translateY(-50%); border-radius: 4px; cursor: default; transition: opacity 0.2s; min-width: 4px; }
        .gantt-bar:hover { opacity: 0.85; }
        .gantt-bar-bg { width: 100%; height: 100%; border-radius: 4px; opacity: 0.25; }
        .gantt-bar-fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 4px; opacity: 0.8; }
        .gantt-today { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--accent-rose); z-index: 10; opacity: 0.7; }
        .gantt-divider { height: 1px; background: var(--border); margin: 0.3rem 0; }
        .gantt-legend { margin-top: 0.8rem; font-size: 0.72rem; color: var(--text-muted); }
        .gantt-legend-line { display: inline-block; width: 12px; height: 3px; background: var(--accent-rose); vertical-align: middle; margin-right: 4px; border-radius: 1px; }

        .gantt-tooltip { position: fixed; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.6rem 0.8rem; font-size: 0.75rem; color: var(--text-secondary); z-index: 100; pointer-events: none; opacity: 0; transition: opacity 0.15s; max-width: 280px; box-shadow: 0 8px 30px var(--tooltip-shadow); }
        .gantt-tooltip.visible { opacity: 1; }
        .gantt-tooltip strong { color: var(--text-primary); }

        .predictions-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 1rem; }
        .prediction-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.4rem; }
        .prediction-card h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.3rem; }
        .prediction-card .card-badges { margin-bottom: 1rem; display: flex; gap: 0.3rem; flex-wrap: wrap; }

        .prediction-timeline { position: relative; padding-left: 0; }
        .prediction-item-icon { display: flex; align-items: flex-start; gap: 0.3rem; margin-bottom: 0.4rem; }
        .prediction-item-icon .pred-icon { flex-shrink: 0; font-size: 0.75rem; line-height: 1; margin-top: 0.05rem; }
        .prediction-item-icon .pred-content { min-width: 0; }

        .pred-title { font-size: 0.82rem; font-weight: 500; }
        .pred-date { font-size: 0.72rem; font-family: 'JetBrains Mono', monospace; color: var(--text-muted); margin-top: 0.1rem; }
        .pred-note { font-size: 0.72rem; color: var(--text-secondary); margin-top: 0.15rem; font-style: italic; }

        .prediction-summary { margin-top: 1rem; padding: 0.8rem; background: rgba(79,143,247,0.06); border: 1px solid rgba(79,143,247,0.15); border-radius: var(--radius-sm); font-size: 0.78rem; color: var(--text-secondary); }
        .prediction-summary strong { color: var(--text-primary); }

        .loading { display: flex; align-items: center; justify-content: center; padding: 4rem; color: var(--text-muted); font-size: 0.9rem; }
        .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 0.8rem; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Error display */
        .error-panel { background: var(--bg-card); border: 1px solid var(--accent-red); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
        .error-panel.error-fatal { border-width: 2px; background: rgba(239,68,68,0.05); }
        .error-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.8rem; }
        .error-header h2 { font-size: 1.1rem; font-weight: 600; color: var(--accent-red); margin: 0; }
        .error-header .error-icon { font-size: 1.2rem; color: var(--accent-red); }
        .error-desc { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1rem; line-height: 1.5; }

        .error-banner { background: var(--bg-card); border: 1px solid var(--accent-amber); border-radius: var(--radius); margin-bottom: 1.5rem; overflow: hidden; }
        .error-banner.has-errors { border-color: var(--accent-red); }
        .error-banner-header { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 1.2rem; cursor: pointer; transition: background 0.15s; }
        .error-banner-header:hover { background: rgba(251,191,36,0.05); }
        .error-banner.has-errors .error-banner-header:hover { background: rgba(239,68,68,0.05); }
        .error-banner-summary { display: flex; align-items: center; gap: 0.6rem; }
        .error-banner-summary .error-icon { font-size: 1rem; color: var(--accent-amber); }
        .error-banner.has-errors .error-banner-summary .error-icon { color: var(--accent-red); }
        .error-count { font-weight: 500; font-size: 0.85rem; }
        .error-badge { background: rgba(239,68,68,0.15); color: var(--accent-red); font-size: 0.68rem; padding: 0.15rem 0.45rem; border-radius: 99px; }
        .warning-badge { background: rgba(251,191,36,0.15); color: var(--accent-amber); font-size: 0.68rem; padding: 0.15rem 0.45rem; border-radius: 99px; }
        .error-toggle-btn { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.3rem 0.7rem; font-size: 0.75rem; color: var(--text-secondary); cursor: pointer; transition: all 0.15s; font-family: 'Outfit', sans-serif; }
        .error-toggle-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
        .error-banner-details { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out, padding 0.3s ease-out; padding: 0 1.2rem; }
        .error-banner-details.expanded { max-height: 600px; padding: 0 1.2rem 1.2rem; overflow-y: auto; }

        .error-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .error-item { display: flex; flex-wrap: wrap; align-items: flex-start; gap: 0.5rem; padding: 0.6rem 0.8rem; background: rgba(251,191,36,0.06); border-left: 3px solid var(--accent-amber); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; font-size: 0.82rem; }
        .error-item.level-error { background: rgba(239,68,68,0.06); border-left-color: var(--accent-red); }
        .error-level-badge { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; padding: 0.1rem 0.4rem; border-radius: 99px; background: rgba(251,191,36,0.2); color: var(--accent-amber); flex-shrink: 0; }
        .error-item.level-error .error-level-badge { background: rgba(239,68,68,0.2); color: var(--accent-red); }
        .error-message { flex: 1; min-width: 200px; color: var(--text-primary); }
        .error-meta { width: 100%; display: flex; gap: 1rem; margin-top: 0.2rem; font-size: 0.72rem; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
        .error-meta code { background: rgba(79,143,247,0.1); padding: 0.1rem 0.3rem; border-radius: 3px; color: var(--accent-blue); }

        @media (max-width: 768px) {
            .header, .content { padding-left: 1.2rem; padding-right: 1.2rem; }
            .tabs { padding: 0 1.2rem; }
            .gantt-label { width: 140px; min-width: 140px; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="header-row">
            <div>
                <h1><span class="icon">◎</span> SMART Goals Tracker</h1>
                <div class="header-meta" id="header-meta">...</div>
            </div>
        </div>
        <div class="toolbar">
            <div class="sort-control">
                <span class="sort-icon" id="sort-label" title="Sort">⇅</span>
                <select id="sort-select" class="sort-select">
                    <option id="sort-opt-file" value="file">File order</option>
